<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein 3D-Druck Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white shadow-sm p-4 text-center">
        <h1 class="text-2xl font-bold tracking-tight">3D-DRUCK STUDIO</h1>
    </nav>

    <section class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-2xl shadow-xl">
        <div class="md:flex gap-8">
            <div class="md:w-1/2 bg-gray-200 rounded-xl h-64 flex items-center justify-center">
                <span class="text-gray-400">Produktfoto hier</span>
            </div>
            
            <div class="md:w-1/2 mt-6 md:mt-0">
                <h2 class="text-3xl font-extrabold">Individueller Fan-Artikel</h2>
                <p class="text-gray-500 mt-2">Hochwertiger 3D-Druck aus umweltfreundlichem PLA. Inklusive Personalisierung.</p>
                
                <div class="mt-6">
                    <span class="text-4xl font-bold">CHF 25.00</span>
                </div>

                <div class="mt-8 p-4 bg-blue-50 border border-blue-100 rounded-xl">
                    <p class="text-blue-800 font-semibold mb-2">Bezahlung via TWINT</p>
                    <div class="bg-white w-32 h-32 mx-auto mb-3 flex items-center justify-center border">
                        <span class="text-[10px] text-gray-400">QR-CODE HIER</span>
                    </div>
                    <p class="text-xs text-blue-600 text-center">Scannen & Betrag manuell eingeben</p>
                </div>

                <a href="mailto:deine-mail@beispiel.ch" class="block mt-4 text-center bg-black text-white py-3 rounded-lg font-bold hover:bg-gray-800 transition">
                    Jetzt Anfragen
                </a>
            </div>
        </div>
    </section>

    <footer class="mt-20 p-10 text-center text-gray-400 text-sm">
        <p>&copy; 2026 Dein Name | <a href="impressum.html" class="underline">Impressum & Rechtliches</a></p>
    </footer>

</body>
</html>
